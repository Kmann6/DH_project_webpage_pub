<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Five Images with Captions</title>
    <style>
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .image-item {
            text-align: center;
            width: 200px;
        }
        .image-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .caption {
            margin-top: 8px;
            font-size: 1em;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Gallery of Images</h1>
    <div class="image-gallery">
        <div class="image-item">
            <img src="planning_index.jpg" alt="Image 1: Webpage landing page showing the title header, five navigation links, and the paragraph headings Overview, Research Questions, Significance, and Course affiliation notes at bottom.">
            <div class="caption">Caption for Image 1</div>
        </div>
        <div class="image-item">
            <img src="planning_findings.jpg" alt="Image 2: Webpage findings page with title and database box.">
            <div class="caption">Caption for Image 2</div>
        </div>
        <div class="image-item">
            <img src="planning_planning.jpg" alt="Image 3: Webpage planning page with title and images.">
            <div class="caption">Caption for Image 3</div>
        </div>
        
        <div class="image-item">
            <img src="planning_addyourstory.jpg" alt="Image 4: Webpage add your story page with title and submission form.">
            <div class="caption">Caption for Image 4</div>
        </div>
        <div class="image-item">
            <img src="planning_sustainability.jpg" alt="Image 5: Webpage sustainability page with title and images.">
            <div class="caption">Caption for Image 5</div>
    </div>
</body>
</html>
